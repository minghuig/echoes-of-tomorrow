name: PR Preview

# Publishes playable web builds to the gh-pages branch:
#   pull requests  -> pr/<number>/   (link upserted as a PR comment)
#   pushes to main -> latest/
# The deploy job enables GitHub Pages (source: gh-pages branch, / root)
# automatically via the REST API, so no manual Settings toggle is needed;
# the "Ensure GitHub Pages serves gh-pages" step is idempotent.
#
# Notes:
# - The web export has thread_support disabled, so no cross-origin
#   isolation headers are needed; plain Pages hosting works.
# - Fork PRs get a read-only GITHUB_TOKEN, so deploys only run for
#   same-repo branches.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]

concurrency:
  group: pr-preview-${{ github.event.number || 'main' }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  pages: write

jobs:
  build:
    name: Build web preview
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The godot-ci image ships export templates in /root, but Actions
      # containers run with HOME=/github/home — move them where Godot looks.
      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.6.3.stable \
            ~/.local/share/godot/export_templates/4.6.3.stable

      - name: Export web build
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "Web" build/web/index.html

      # Music is excluded from the pck (export_presets exclude_filter) and
      # streamed on demand by view/music.gd — ship the mp3s beside index.html.
      - name: Stage streamed audio
        run: |
          mkdir -p build/web/audio
          cp assets/music/*.mp3 build/web/audio/

      - name: Upload preview build
        uses: actions/upload-artifact@v4
        with:
          name: preview-build
          path: build/web

  deploy:
    name: Deploy to gh-pages
    needs: build
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Download preview build
        uses: actions/download-artifact@v4
        with:
          name: preview-build
          path: build/web

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          destination_dir: ${{ github.event_name == 'push' && 'latest' || format('pr/{0}', github.event.number) }}
          commit_message: "deploy: ${{ github.event_name == 'push' && 'latest' || format('pr/{0}', github.event.number) }} @ ${{ github.sha }}"

      # Without this, the build lands on gh-pages but Pages never serves it,
      # so every preview link 404s until someone flips Settings -> Pages by
      # hand. Enable (or repoint) Pages at the gh-pages branch root on every
      # deploy so the links just work. Idempotent; never fails the deploy.
      - name: Ensure GitHub Pages serves gh-pages
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const source = { branch: 'gh-pages', path: '/' };
            try {
              const { data } = await github.rest.repos.getPages({ ...context.repo });
              const cur = data.source || {};
              if (cur.branch !== source.branch || cur.path !== source.path) {
                await github.rest.repos.updateInformationAboutPagesSite({ ...context.repo, source });
                core.info(`Repointed Pages to ${source.branch}${source.path}`);
              } else {
                core.info('Pages already serving gh-pages/');
              }
            } catch (e) {
              if (e.status === 404) {
                await github.rest.repos.createPagesSite({ ...context.repo, source });
                core.info('Enabled Pages from gh-pages/');
              } else {
                core.warning(`Could not configure Pages: ${e.status} ${e.message}`);
              }
            }

      - name: Comment preview link on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-link -->';
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr/${context.issue.number}/`;
            const body = [
              marker,
              `📱 **Playable web preview:** ${url}`,
              '',
              `Updated for ${context.payload.pull_request.head.sha}.`,
              '',
              '_First deploy can take a minute for Pages to go live.',
              'Touch controls appear automatically on phones and tablets._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment(
                { ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment(
                { ...context.repo, issue_number: context.issue.number, body });
            }

  cleanup:
    name: Remove closed PR preview
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        id: checkout_pages
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages

      - name: Delete preview directory
        if: steps.checkout_pages.outcome == 'success'
        run: |
          if [ -d "pr/${{ github.event.number }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -r "pr/${{ github.event.number }}"
            git commit -m "cleanup: remove pr/${{ github.event.number }} preview"
            git push
          fi
